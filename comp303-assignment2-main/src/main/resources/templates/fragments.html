<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-assets">
<meta charset="UTF-8">
<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
	rel="stylesheet">
<style>
 .navbar-premium { background-color: #002d72; }

.table-container {
	background: white;
	border-radius: 15px;
	padding: 25px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
}

.status-badge {
	font-size: 0.85rem;
	padding: 5px 10px;
	border-radius: 20px;
}
</style>
</head>
<body>

	<!-- Added th:fragment="navbar(activePage)" to allow dynamic active states -->
	<nav th:fragment="navbar(activePage)"
		class="navbar navbar-expand-lg navbar-dark navbar-premium mb-5">
		<div class="container">
			<a class="navbar-brand fw-bold" th:href="@{/cruises}">Luxury
				Cruise Lines</a>
			<div class="navbar-nav ms-auto">
				<!-- Dynamic active class based on the 'activePage' parameter -->
				<a class="nav-link"
					th:classappend="${activePage == 'new' ? 'active' : ''}"
					th:href="@{/bookings/add}">New Booking</a> <a class="nav-link"
					th:classappend="${activePage == 'bookings' ? 'active' : ''}"
					th:href="@{/bookings}">My Bookings</a> <a
					class="nav-link text-warning" th:href="@{/logout}">Logout</a>
			</div>
		</div>
	</nav>

</body>
</html>
