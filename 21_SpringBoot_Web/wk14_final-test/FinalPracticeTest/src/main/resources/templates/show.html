<html xmlns:th="http://www.thymeleaf.org">
  <head>
  <meta charset="UTF-8">
    <title>User List</title>
    <style>
        .header-actions { margin-bottom: 15px; text-align: right; }
        .btn { padding: 5px 10px; text-decoration: none; border-radius: 4px; color: white; }
        .btn-create { background-color: #28a745; }
        .btn-view { background-color: #17a2b8; }
        .btn-edit { background-color: #ffc107; color: black; }
        .btn-delete { background-color: #dc3545; }
        .btn-back { background-color: #6c757d; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; }
    </style>
  </head>

  <body>
    <h2>User Details</h2>
    <div class="header-actions">
        <a th:href="@{/users/create}" class="btn btn-create">Create User</a>
        <a th:href="@{/search}" class="btn  btn-back">Search User</a>
       
    </div>
    <table border="1">
      <thead>
        <tr>
          <th>User ID</th>
          <th>User Name</th>
          <th>Email</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="user : ${users}">
          <td th:text="${user.id}"></td>
          <td th:text="${user.name}"></td>
          <td th:text="${user.email}"></td>
          <td>
                    <a th:href="@{/show/{id}(id=${user.id})}" class="btn btn-view">浏览</a>
                    
                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-edit">编辑</a>
                    
                    <a th:href="@{/users/delete/{id}(id=${user.id})}" 
                       class="btn btn-delete" 
                       onclick="return confirm('确定要删除吗？')">删除</a>
                </td>
        </tr>
      </tbody>
    </table>
  </body>
</html>
