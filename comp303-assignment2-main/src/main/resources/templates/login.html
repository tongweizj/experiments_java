<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Luxury Cruise - Sign In</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card shadow">
                    <div class="card-header bg-dark text-white text-center">
                        <h4 class="mb-0">Member Sign In</h4>
                    </div>
                    <div class="card-body">
                        
                        <div th:if="${error}" class="alert alert-danger" role="alert">
                            <span th:text="${error}">Invalid username or password</span>
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username (Email)</label>
                                <input type="text" id="username" name="username" class="form-control" required />
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Password</label>
                                <input type="password" id="password" name="password" class="form-control" required />
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-dark">Sign In</button>
                            </div>
                        </form>
                        
                        <hr>
                        
                        <div class="text-center">
                            <p class="mb-1">New customer?</p>
                            <a th:href="@{/register}" class="btn btn-outline-primary btn-sm">Create Account</a>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <a th:href="@{/}" class="text-muted small">Back to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html></html>
