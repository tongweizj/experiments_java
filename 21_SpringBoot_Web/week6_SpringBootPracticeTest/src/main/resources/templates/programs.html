<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Programs - SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 shadow-sm p-4 bg-white rounded">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <div>
            <h2 class="text-primary">Available Programs</h2>
            <p class="text-muted mb-0">Overview of all unique academic programs</p>
        </div>
        <div>
            <span class="badge bg-primary fs-6">Total: <span th:text="${programMap.size()}">0</span></span>
            <a href="/" class="btn btn-outline-secondary ms-2">Back to List</a>
        </div>
    </div>

    <div class="table-responsive">
       
        
        <table class="table table-hover table-striped">
    <thead class="table-primary">
        <tr>
            <th>Program Name</th>
            <th class="text-center">Student Count</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="entry : ${programMap}">
            <td th:text="${entry.key}" class="fw-bold">Software Engineering</td>
            <td class="text-center">
                <span class="badge bg-info text-dark" th:text="${entry.value}">0</span>
            </td>
        </tr>
    </tbody>
</table>
    </div>

    <div class="mt-4 pt-3 border-top">
        <p class="small text-muted text-end">Generated by Student Management System v1.0</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
