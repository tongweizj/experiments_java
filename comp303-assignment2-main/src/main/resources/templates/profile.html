<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Profile - Luxury Cruise</title>
    <th:block th:replace="~{fragments/header :: common-head}"></th:block>
</head>
<body>
    <div th:replace="~{fragments/nav :: headerNav('profile')}"></div>
    

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-white py-3">
                        <h4 class="mb-0 text-primary">Manage Your Profile</h4>
                    </div>
                    <div class="card-body p-4">
                        <div th:if="${param.success}" class="alert alert-success">
                            Profile updated successfully!
                        </div>

                       <form th:action="@{/profile/update}" th:object="${customer}" method="post">
    <input type="hidden" th:field="*{customer_id}" />

    <div class="row mb-3">
        <div class="col-md-6">
            <label class="form-label">First Name</label>
            <input type="text" class="form-control" th:field="*{firstname}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Last Name</label>
            <input type="text" class="form-control" th:field="*{lastname}" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Username / Email</label>
        <input type="email" class="form-control" th:field="*{username}" required>
        <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
    </div>

   <div class="mb-3">
    <label class="form-label">Password</label>
 
      <input id="password" class="form-control"  type="password" name="password" th:value="*{password}"/>
     
    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
    <small class="text-muted">Security tip: Use at least 6 characters.</small>
</div>

    <div class="mb-3">
        <label class="form-label">Address</label>
        <input type="text" class="form-control" th:field="*{address}">
    </div>

    <div class="row mb-3">
        <div class="col-md-8">
            <label class="form-label">City</label>
            <input type="text" class="form-control" th:field="*{city}">
        </div>
        <div class="col-md-4">
            <label class="form-label">Postal Code</label>
            <input type="text" class="form-control" th:field="*{postalCode}">
        </div>
    </div>

    <hr>
    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
        <a th:href="@{/bookings}" class="btn btn-outline-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary px-5">Update Profile</button>
    </div>
</form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
