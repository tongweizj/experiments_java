<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search Vehicle</title>
    <style>
        /* 复用 show.html 的核心样式 */
        body { font-family: sans-serif; padding: 20px; }
        .header-actions { margin-bottom: 20px; }
        
        /* 按钮与表单控件样式 */
        .btn { padding: 8px 15px; text-decoration: none; border-radius: 4px; color: white; border: none; cursor: pointer; display: inline-block; font-size: 14px; }
        .btn-primary { background-color: #007bff; } /* 搜索按钮使用蓝色 */
        .btn-back { background-color: #6c757d; }
        
        input[type="text"] {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* 结果展示表格 */
        table { width: 50%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; width: 30%; }
        
        .result-container { margin-top: 30px; }
        .success-msg { color: #28a745; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Search Vehicle by Year</h2>

    <div class="header-actions">
        <form th:action="@{/search}" method="get">
            <label>Year:</label>
            <input type="text" name="year" placeholder="Enter year to search..." required />
            <button type="submit" class="btn btn-primary">Search Now</button>
            <a th:href="@{/vehicles}" class="btn btn-back">Back to List</a>
        </form>
    </div>

    <div class="result-container" >
        <hr>
        
        <table border="1">
      <thead>
        <tr>
          <th>Vehicle ID</th>
          <th>Vin Number</th>
          <th>Brand</th>
          <th>Model</th>
          <th>Year</th>
          <th>Price</th>
          <th>Added Date</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="vehicle : ${vehicles}">
          <td th:text="${vehicle.id}"></td>
          <td th:text="${vehicle.vinNumber}"></td>
          <td th:text="${vehicle.brand}"></td>
          <td th:text="${vehicle.model}"></td>
          <td th:text="${vehicle.year}"></td>
          <td th:text="${vehicle.price}"></td>
          <td th:text="${vehicle.addedDate}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(vehicles)}">
                <td colspan="7">No vehicles found for this year.</td>
         </tr>
      </tbody>
    </table>
    </div>

    <div th:if="${vehicles == null and param.year != null and !#lists.isEmpty(param.year)}">
    <p style="color: #dc3545;">No vehicle found with this year.</p>
</div>

</body>
</html>
