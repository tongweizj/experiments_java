<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Add Student - SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 shadow-sm p-4 bg-white rounded">
    
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
        <h2 class="text-primary">Add New Student</h2>
        <a href="/" class="btn btn-outline-secondary">Back to List</a>
    </div>

    <div class="card border-0">
        <div class="card-body">
            <form th:action="@{/add}" th:object="${student}" method="post" class="row g-3">
                
                <div class="col-md-6">
                    <label for="name" class="form-label fw-bold">Full Name</label>
                    <input type="text" th:field="*{name}" id="name" 
                           class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'" 
                           placeholder="Enter student's name">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" th:field="*{email}" id="email" 
                           class="form-control" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                           placeholder="example@college.com">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                </div>

                <div class="col-md-12">
                    <label for="programName" class="form-label fw-bold">Program Name</label>
                    <input type="text" th:field="*{programName}" id="programName" 
                           class="form-control" th:classappend="${#fields.hasErrors('programName')} ? 'is-invalid'"
                           placeholder="e.g. Software Engineering Technology">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('programName')}" th:errors="*{programName}"></div>
                </div>

                <div class="col-12 mt-4 pt-3 border-top">
                    <button type="submit" class="btn btn-primary px-5">Save Student</button>
                    <a href="/" class="btn btn-link text-decoration-none text-muted">Discard changes</a>
                </div>
                
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
