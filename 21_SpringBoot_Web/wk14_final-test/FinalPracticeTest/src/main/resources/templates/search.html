<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Search User</title>
    <style>
        /* 复用 show.html 的核心样式 */
        body { font-family: sans-serif; padding: 20px; }
        .header-actions { margin-bottom: 20px; }
        
        /* 按钮与表单控件样式 */
        .btn { padding: 8px 15px; text-decoration: none; border-radius: 4px; color: white; border: none; cursor: pointer; display: inline-block; font-size: 14px; }
        .btn-primary { background-color: #007bff; } /* 搜索按钮使用蓝色 */
        .btn-back { background-color: #6c757d; }
        
        input[type="text"] {
            padding: 8px;
            width: 250px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-right: 10px;
        }

        /* 结果展示表格 */
        table { width: 50%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background-color: #f8f9fa; width: 30%; }
        
        .result-container { margin-top: 30px; }
        .success-msg { color: #28a745; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Search User by Email</h2>

    <div class="header-actions">
        <form th:action="@{/search}" method="get">
            <label>Email Address:</label>
            <input type="text" name="email" placeholder="Enter email to search..." required />
            <button type="submit" class="btn btn-primary">Search Now</button>
            <a th:href="@{/show}" class="btn btn-back">Back to List</a>
        </form>
    </div>

    <div class="result-container" th:if="${user != null}">
        <hr>
        <p class="success-msg">✔ Result Found:</p>
        <table>
            <tr>
                <th>User ID</th>
                <td th:text="${user.id}"></td>
            </tr>
            <tr>
                <th>User Name</th>
                <td th:text="${user.name}"></td>
            </tr>
            <tr>
                <th>Email Address</th>
                <td th:text="${user.email}"></td>
            </tr>
            <tr>
                <th>Actions</th>
                <td>
                    <a th:href="@{/users/edit/{id}(id=${user.id})}" 
                       style="color: #007bff; text-decoration: none; font-weight: bold;">Edit this user</a>
                </td>
            </tr>
        </table>
    </div>

    <div th:if="${user == null and param.email != null and !#lists.isEmpty(param.email)}">
    <p style="color: #dc3545;">No user found with this email.</p>
</div>

</body>
</html>
