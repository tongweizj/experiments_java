<nav th:fragment="headerNav(activePage)" 
  class="navbar navbar-expand-lg navbar-dark navbar-premium "
  th:classappend="${activePage != 'home'} ? 'mb-4' : ''">
    <div class="container">
        <a class="navbar-brand" href="/">Luxury Cruise</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" th:href="@{/}" 
                   th:classappend="${activePage == 'home'} ? 'active' : ''">Home</a>
                
                <th:block th:if="${session.loggedInUser != null}">
                    <a class="nav-link" th:href="@{/bookings}" 
                       th:classappend="${activePage == 'bookings'} ? 'active' : ''">My Bookings</a>
                    
                    <a class="nav-link" th:href="@{/profile}" 
                       th:classappend="${activePage == 'profile'} ? 'active' : ''">Profile</a>

                    <a class="nav-link text-warning" th:href="@{/logout}">Logout</a>
                </th:block>

                <th:block th:if="${session.loggedInUser == null}">
                    <a class="nav-link" th:href="@{/login}"
                       th:classappend="${activePage == 'login'} ? 'active' : ''">Sign In</a>
                    
                    <a class="nav-link" th:href="@{/register}"
                       th:classappend="${activePage == 'register'} ? 'active' : ''">Create Account</a>
                </th:block>
            </div>
        </div>
    </div>
</nav>
