<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5 shadow-sm p-4 bg-white rounded">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">Student Management System</h2>
        <div>
            <a href="/add" class="btn btn-primary me-2">+ Add Student</a>
            <a href="/programs" class="btn btn-secondary">View Programs</a>
        </div>
    </div>

    <div class="card mb-4">
        <div class="card-body">
            <form method="get" action="/" class="row g-3 align-items-center">
                <div class="col-auto">
                    <label for="program" class="col-form-label fw-bold">Filter by Program:</label>
                </div>
                <div class="col-sm-4">
                    <input type="text" name="program" id="program" class="form-control" placeholder="Enter program name...">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary">Search</button>
                    <a href="/" class="btn btn-link text-decoration-none">Reset</a>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
	    <p  th:if="${not #strings.isEmpty(selectedProgram)}">
		    <small class="text-muted" th:text="|Showing students for: ${selectedProgram}|"></small>
		</p>
        <table class="table table-hover table-striped align-middle">
            <thead class="table-primary">
                <tr>
                    <th># Number</th>
                    <th>Name</th>
                    <th>Program</th>
                    <th>Email</th>
                    <th class="text-center">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="student : ${students}">
                    <td th:text="${student.number}" class="fw-bold">1</td>
                    <td th:text="${student.name}">Name</td>
                    <td>
                        <span class="badge bg-secondary" th:text="${student.programName}">Program</span>
                    </td>
                    <td th:text="${student.email}">Email</td>
                    <td class="text-center">
                        
                            <a th:href="@{/edit/{id}(id=${student.number})}" class="btn btn-sm btn-outline-primary">Edit</a>
                            <a th:href="@{/delete/{id}(id=${student.number})}" 
                               class="btn btn-sm btn-outline-danger" 
                               onclick="return confirm('Delete this student permanently?')">Delete</a>
                       <div class="btn-group" role="group"> </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(students)}">
                    <td colspan="5" class="text-center text-muted">No students found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
